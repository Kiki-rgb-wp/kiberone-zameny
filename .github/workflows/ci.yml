# CI/CD: при пуше — тесты, деплой миграций и (опционально) Railway
name: CI

on:
  push:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install backend deps
        run: cd backend && npm ci

      - name: Unit tests (backend)
        run: cd backend && npm run test

  db-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Supabase db push
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        continue-on-error: true

  deploy:
    runs-on: ubuntu-latest
    needs: [test]
    if: false
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Railway
        run: echo "Настройте Railway CLI или GitHub integration: переменные SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, NOTIFY_EMAIL_ADMIN, RESEND_API_KEY"
